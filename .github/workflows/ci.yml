name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install LilyPond
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: lilypond

      - name: Build
        run: pnpm --filter astro-lilypond build

      - name: Test
        run: pnpm --filter astro-lilypond test --run

      - name: Integration test
        run: pnpm --filter astro-lilypond test:integration

      - name: Lint
        run: pnpm check
