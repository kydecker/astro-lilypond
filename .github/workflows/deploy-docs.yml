name: Deploy Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache LilyPond
        id: cache-lilypond
        uses: actions/cache@v4
        with:
          path: ~/lilypond-2.26.0
          key: lilypond-2.26.0-linux-x86_64

      - name: Install LilyPond
        if: steps.cache-lilypond.outputs.cache-hit != 'true'
        run: |
          curl -sL -o /tmp/lilypond.tar.gz "https://gitlab.com/lilypond/lilypond/-/releases/v2.26.0/downloads/lilypond-2.26.0-linux-x86_64.tar.gz"
          tar xzf /tmp/lilypond.tar.gz -C "$HOME"

      - name: Add LilyPond to PATH
        run: echo "$HOME/lilypond-2.26.0/bin" >> "$GITHUB_PATH"

      - name: Build library
        run: pnpm --filter astro-lilypond build

      - name: Build docs
        run: pnpm --filter docs build

      - name: Deploy to Cloudflare Workers
        run: pnpm deploy:docs
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
